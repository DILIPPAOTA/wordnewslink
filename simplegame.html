
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Kids Arcade V2</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #8ecae6; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 550px; margin: 15px auto; background: white; padding: 20px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); text-align: center; border: 5px solid #023047; position: relative; z-index: 10; }
        h1 { color: #023047; font-size: 1.8rem; margin: 0 0 10px 0; }
        .score-board { font-size: 1.4rem; background: #fb8500; color: white; padding: 8px 25px; border-radius: 50px; display: inline-block; margin-bottom: 15px; border: 3px solid #023047; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-main { padding: 15px; font-size: 14px; border: none; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 4px #555; }
        #game-area { display: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opt-btn { padding: 15px; font-size: 1.1rem; border: 3px solid #023047; border-radius: 15px; cursor: pointer; background: #fff; font-weight: bold; transition: 0.2s; }
        #msg { font-size: 1.4rem; margin-top: 15px; font-weight: bold; min-height: 35px; }
        .light-burst { position: absolute; pointer-events: none; border-radius: 50%; animation: burst 0.6s ease-out forwards; z-index: 1; }
        @keyframes burst { 0% { width: 0; height: 0; opacity: 1; box-shadow: 0 0 20px white; } 100% { width: 350px; height: 350px; opacity: 0; box-shadow: 0 0 100px currentColor; } }
        .earth-link { display: block; margin-top: 15px; background: #219ebc; color: white; padding: 12px; border-radius: 15px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="box">
    <h1>🚀 Kids Fun Arcade 🚀</h1>
    <div class="score-board">Score: <span id="score">0</span></div>

    <div id="main-menu" class="menu">
        <button class="btn-main" style="background:#ff595e" onclick="start('india')">1. India (All States)</button>
        <button class="btn-main" style="background:#3a86ff" onclick="start('math')">2. Fun Math</button>
        <button class="btn-main" style="background:#8338ec" onclick="start('animal')">3. Animal sounds</button>
        <button class="btn-main" style="background:#38b000" onclick="start('table')">4. Tables (1-25)</button>
        <button class="btn-main" style="background:#fb5607" onclick="start('rps')">5. Rock-Paper-Scissors</button>
        <button class="btn-main" style="background:#ff006e" onclick="start('guess')">6. Big/Small</button>
        <button class="btn-main" style="background:#00b4d8" onclick="start('color')">7. Color Quiz</button>
        <button class="btn-main" style="background:#ef476f" onclick="start('fruit')">8. 50+ Fruits</button>
        <button class="btn-main" style="background:#06d6a0; color:#333" onclick="start('spell')">9. Spelling Bee</button>
        <button class="btn-main" style="background:#118ab2" onclick="start('shapes')">10. All Shapes</button>
    </div>

    <div id="game-area">
        <h2 id="ques" style="color:#d00000; min-height:50px;"></h2>
        <div id="options" class="options-grid"></div>
        <div id="msg"></div>
        <button onclick="location.reload()" style="background:#666; color:white; border:none; padding:10px 20px; border-radius:10px; margin-top:20px; cursor:pointer;">Main Menu</button>
    </div>
    
    <a href="https://earth.google.com/web/@22.58335694,78.42869928,-208.84533213a,12937880.18143416d,35y,0h,0t,0r/data=CgRCAggBQgIIAEoNCP___________wEQAA" target="_blank" class="earth-link">🌍 Explore Google Earth</a>
</div>

<script>
    let mode = "", correct = "", score = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const DB = {
        india: {"Andhra Pradesh":"Amaravati", "Arunachal Pradesh":"Itanagar", "Assam":"Dispur", "Bihar":"Patna", "Chhattisgarh":"Raipur", "Goa":"Panaji", "Gujarat":"Gandhinagar", "Haryana":"Chandigarh", "Himachal Pradesh":"Shimla", "Jharkhand":"Ranchi", "Karnataka":"Bengaluru", "Kerala":"Thiruvananthapuram", "Madhya Pradesh":"Bhopal", "Maharashtra":"Mumbai", "Manipur":"Imphal", "Meghalaya":"Shillong", "Mizoram":"Aizawl", "Nagaland":"Kohima", "Odisha":"Bhubaneswar", "Punjab":"Chandigarh", "Rajasthan":"Jaipur", "Sikkim":"Gangtok", "Tamil Nadu":"Chennai", "Telangana":"Hyderabad", "Tripura":"Agartala", "Uttar Pradesh":"Lucknow", "Uttarakhand":"Dehradun", "West Bengal":"Kolkata"},
        animals: {"Lion":"Roar", "Dog":"Woof", "Cat":"Meow", "Cow":"Moo", "Duck":"Quack", "Sheep":"Baa", "Elephant":"Trumpet", "Horse":"Neigh", "Snake":"Hiss", "Monkey":"Chatter", "Bee":"Buzz", "Frog":"Croak"},
        spellings: ["APPLE", "MANGO", "BANANA", "ORANGE", "GRAPES", "FLOWER", "SCHOOL", "INDIA", "TIGER", "ZEBRA", "COMPUTER", "WATER", "EARTH", "BOTTLE", "FRIEND", "BIRD", "FISH", "CHAIR", "TABLE", "PENCIL", "MOBILE", "GARDEN", "FOREST", "RIVER", "MOUNTAIN", "HOUSE", "PLANE", "ROCKET", "STAR", "MOON", "RAINBOW", "BUTTERFLY", "UMBRELLA", "KITCHEN", "VILLAGE", "DOCTOR", "POLICE", "FATHER", "MOTHER", "SISTER", "BROTHER", "PUPPY", "KITTEN"],
        shapes: {"Ball":"Circle", "Box":"Square", "Door":"Rectangle", "Samosa":"Triangle", "Star Fish":"Star", "Egg":"Oval", "Kite":"Diamond", "Wheel":"Circle", "Book":"Rectangle", "Laptop":"Rectangle", "Pizza Slice":"Triangle", "Clock":"Circle"},
        colors: {"Sky":"Blue", "Milk":"White", "Grass":"Green", "Crow":"Black", "Sun":"Yellow", "Carrot":"Orange", "Teeth":"White", "Hair":"Black", "Leaf":"Green", "Blood":"Red"},
        fruits: {"Mango":"Yellow", "Apple":"Red", "Banana":"Yellow", "Orange":"Orange", "Grapes":"Green", "Strawberry":"Red", "Watermelon":"Green", "Blueberry":"Blue", "Kiwi":"Brown", "Cherry":"Red", "Pineapple":"Yellow", "Coconut":"Brown", "Pomegranate":"Red", "Papaya":"Yellow"}
    };

    function playSound(type) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(type=='win'?600:150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function showLight() {
        const burst = document.createElement('div'); burst.className = 'light-burst';
        burst.style.left = '50%'; burst.style.top = '50%'; burst.style.color = '#ffb703';
        burst.style.transform = 'translate(-50%, -50%)';
        document.body.appendChild(burst); setTimeout(() => burst.remove(), 600);
    }

    function start(m) {
        mode = m; document.getElementById('main-menu').style.display='none';
        document.getElementById('game-area').style.display='block'; next();
    }

    function next() {
        let opts = []; let qText = "";
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        document.getElementById('msg').innerText = "";

        if(mode == 'fruit') {
            let k = Object.keys(DB.fruits); let pick = k[Math.floor(Math.random()*k.length)];
            qText = "Color of " + pick + "?"; correct = DB.fruits[pick];
            opts = ["Red", "Yellow", "Green", "Orange", "Blue", "Brown", "Purple"].filter(x=>x!=correct).sort(()=>0.5-Math.random()).slice(0,3);
            opts.push(correct);
        } else if(mode == 'india') {
            let k = Object.keys(DB.india); let pick = k[Math.floor(Math.random()*k.length)];
            qText = "Capital of " + pick + "?"; correct = DB.india[pick];
            opts = [correct, "Delhi", "Mumbai", "Kolkata", "Patna", "Chennai", "Goa"].filter(x=>x!=correct).sort(()=>0.5-Math.random()).slice(0,3);
            opts.push(correct);
        } else if(mode == 'shapes') {
            let k = Object.keys(DB.shapes); let pick = k[Math.floor(Math.random()*k.length)];
            qText = "Shape of " + pick + "?"; correct = DB.shapes[pick];
            opts = ["Circle", "Square", "Triangle", "Rectangle", "Star", "Diamond", "Oval"].filter(x=>x!=correct).sort(()=>0.5-Math.random()).slice(0,3);
            opts.push(correct);
        } else if(mode == 'spell') {
            let word = DB.spellings[Math.floor(Math.random()*DB.spellings.length)];
            let idx = Math.floor(Math.random()*word.length); correct = word[idx];
            qText = word.substring(0, idx) + "_" + word.substring(idx+1);
            opts = [correct, "A", "E", "I", "O", "U", "B", "D", "K", "L", "S"].filter(l => l != correct).sort(()=>0.5-Math.random()).slice(0, 3);
            opts.push(correct);
        } else if(mode == 'math') {
            let a = Math.floor(Math.random()*50), b = Math.floor(Math.random()*50);
            qText = a + " + " + b + " = ?"; correct = (a+b).toString();
            opts = [correct, (a+b+5).toString(), (a+b-2).toString(), (a+b+10).toString()];
        } else if(mode == 'table') {
            let t = Math.floor(Math.random()*25)+1, n = Math.floor(Math.random()*10)+1;
            qText = t + " x " + n + " = ?"; correct = (t*n).toString();
            opts = [correct, (t*n+t).toString(), (t*n-t).toString(), (t*n+1).toString()];
        } else if(mode == 'animal') {
            let k = Object.keys(DB.animals); let pick = k[Math.floor(Math.random()*k.length)];
            qText = pick + " sound?"; correct = DB.animals[pick];
            opts = ["Roar", "Meow", "Woof", "Moo", "Hiss", "Neigh", "Trumpet"].filter(x=>x!=correct).sort(()=>0.5-Math.random()).slice(0,3);
            opts.push(correct);
        } else if(mode == 'color') {
            let k = Object.keys(DB.colors); let pick = k[Math.floor(Math.random()*k.length)];
            qText = "Color of " + pick + "?"; correct = DB.colors[pick];
            opts = ["Red", "Blue", "Green", "Yellow", "Black", "White", "Orange"].filter(x=>x!=correct).sort(()=>0.5-Math.random()).slice(0,3);
            opts.push(correct);
        } else if(mode == 'guess') {
            let n1 = Math.floor(Math.random()*200), n2 = Math.floor(Math.random()*200);
            qText = "Bigger: " + n1 + " or " + n2 + "?"; correct = (n1 > n2 ? n1 : n2).toString(); opts = [n1.toString(), n2.toString()];
        } else if(mode == 'rps') {
            qText = "Rock, Paper or Scissors?"; correct = "rps"; opts = ["Rock", "Paper", "Scissors"];
        }

        document.getElementById('ques').innerText = qText;
        opts.sort(() => Math.random() - 0.5).forEach(o => {
            let b = document.createElement('button'); b.className = "opt-btn";
            b.innerText = o; b.onclick = () => check(o); optDiv.appendChild(b);
        });
    }

    function check(val) {
        if(mode == 'rps') {
            let cpu = ["Rock", "Paper", "Scissors"][Math.floor(Math.random()*3)];
            if(val == cpu) { document.getElementById('msg').innerText = "Tie! CPU chose " + cpu; }
            else if((val=='Rock'&&cpu=='Scissors')||(val=='Paper'&&cpu=='Rock')||(val=='Scissors'&&cpu=='Paper')) {
                document.getElementById('msg').innerHTML = "<span style='color:green'>WON! 🎉 CPU: "+cpu+"</span>"; showLight(); playSound('win'); score+=10;
            } else { document.getElementById('msg').innerHTML = "<span style='color:red'>Lost! 😢 CPU: "+cpu+"</span>"; playSound('lose'); }
            setTimeout(next, 1500);
        } else if(val == correct) {
            document.getElementById('msg').innerHTML = "<span style='color:green'>Correct! ✅</span>";
            showLight(); playSound('win'); score += 10; document.getElementById('score').innerText = score;
            setTimeout(next, 1000);
        } else {
            document.getElementById('msg').innerHTML = "<span style='color:red'>Wrong! ❌ Answer: "+correct+"</span>"; playSound('lose'); setTimeout(next, 1500);
        }
    }
</script>
</body>
</html>
