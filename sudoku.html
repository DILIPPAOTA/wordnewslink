
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Pro - Target Time Mode</title>
    <style>
        :root { --primary: #4caf50; --error: #f44336; --accent: #2196F3; --bg: #f0f2f5; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 15px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); width: 380px; }
        .stats-row { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 5px; }
        
        /* TARGET TIME DISPLAY */
        .target-box { background: #fff3cd; color: #856404; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 10px; border: 1px solid #ffeeba; }

        .grid-container { background: #000; padding: 3px; border: 4px solid #000; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(9, 48px); grid-template-rows: repeat(9, 48px); background: #000; gap: 1px; }
        .cell { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #fff; box-sizing: border-box; }

        .cell:nth-child(3n) { border-right: 3px solid #000; }
        .cell:nth-child(9n) { border-right: none; }
        .row-thick-border { border-bottom: 3px solid #000 !important; }

        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 22px; outline: none; background: transparent; }
        .fixed { background: #f1f4f6 !important; font-weight: bold; color: #333; }
        .user-correct { color: #27ae60 !important; font-weight: bold; }
        .user-wrong { color: #e74c3c !important; font-weight: bold; background: #fdf2f2; }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-start { background: var(--primary); }
        .btn-restart { background: #9b59b6; }
        .btn-pause { background: #7f8c8d; }
        .btn-action { background: #34495e; }
        .btn-hint { background: #f39c12; }
        .btn-giveup { background: var(--error); }
        
        .paused-grid { filter: blur(12px); opacity: 0.3; pointer-events: none; }
        #pause-msg { position: absolute; top: 45%; left: 0; width: 100%; text-align: center; font-weight: bold; font-size: 24px; color: #000; display: none; z-index: 10; }
        select { padding: 10px; border-radius: 8px; border: 2px solid #34495e; font-weight: bold; background: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats-row">
            <span id="level-display">SUDOKU</span>
            <span id="timer-display">⏱ 00:00</span>
            <span style="color: var(--accent);">Moves: <span id="move-count">0</span></span>
        </div>
    </div>

    <!-- TARGET INFO DISPLAY -->
    <div class="target-box" id="target-info">Select Level to see Target Time</div>

    <div class="controls">
        <select id="diff-select" onchange="updateTargetInfo()">
            <option value="easy">Easy Mode</option>
            <option value="medium">Medium Mode</option>
            <option value="hard">Hard Mode</option>
        </select>
        <button class="btn-start" onclick="playEffect('start'); startNewGame()">New Game</button>
        <button id="restart-btn" class="btn-restart" onclick="playEffect('click'); restartCurrentLevel()" style="display: none;">Restart</button>
        <button id="pause-btn" class="btn-pause" onclick="playEffect('click'); togglePause()" style="display: none;">⏸ Pause</button>
    </div>

    <div class="grid-container">
        <div id="pause-msg">GAME PAUSED</div>
        <div id="grid" class="grid"></div>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="playEffect('click'); undo()">↩ Undo</button>
        <button class="btn-action" onclick="playEffect('click'); redo()">↪ Redo</button>
        <button class="btn-hint" onclick="playEffect('hint'); giveHint()">Hint (<span id="h-count">3</span>)</button>
        <button class="btn-giveup" onclick="playEffect('click'); revealAnswer()">Give Up</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playEffect(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'type') { osc.frequency.setValueAtTime(600, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'click') { osc.frequency.setValueAtTime(400, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'hint') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
            else if (type === 'start') { osc.frequency.setValueAtTime(440, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
            else if (type === 'win') { [523, 659, 783, 1046].forEach((f, i) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1); g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3); }); }
        }

        let sol = [], initialPuzzle = [], hints = 3, moves = 0, history = [], redoStack = [], currentDiff = 'easy';
        let timer, seconds = 0, isPaused = false;

        const normalTimes = { easy: "05:00", medium: "12:00", hard: "25:00" };
        const normalSecs = { easy: 300, medium: 720, hard: 1500 };

        function updateTargetInfo() {
            let diff = document.getElementById('diff-select').value;
            document.getElementById('target-info').innerText = `Normal Brain Solve Time: ${normalTimes[diff]}`;
        }

        function startNewGame() {
            document.getElementById('restart-btn').style.display = "inline-block";
            document.getElementById('pause-btn').style.display = "inline-block";
            document.getElementById('pause-msg').style.display = "none";
            document.getElementById('grid').classList.remove('paused-grid');

            isPaused = false; moves = 0; hints = 3; history = []; redoStack = []; seconds = 0;
            currentDiff = document.getElementById('diff-select').value;
            document.getElementById('level-display').innerText = currentDiff.toUpperCase();
            document.getElementById('move-count').innerText = "0";
            document.getElementById('h-count').innerText = "3";
            updateTargetInfo();

            let b = Array.from({length:9}, () => Array(9).fill(0));
            fillSudoku(b); sol = b.map(r => [...r]);
            
            let puzzle = b.map(r => [...r]);
            let removed = currentDiff === 'easy' ? 35 : currentDiff === 'medium' ? 48 : 58;
            while(removed > 0) {
                let r = Math.floor(Math.random()*9), c = Math.floor(Math.random()*9);
                if(puzzle[r][c] !== 0) { puzzle[r][c] = 0; removed--; }
            }
            initialPuzzle = puzzle.map(r => [...r]);
            render(puzzle); startTimer();
        }

        function restartCurrentLevel() {
            if (!initialPuzzle.length) return;
            moves = 0; history = []; redoStack = []; seconds = 0;
            document.getElementById('move-count').innerText = "0";
            render(initialPuzzle);
            if (isPaused) togglePause();
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('grid').classList.toggle('paused-grid');
            document.getElementById('pause-msg').style.display = isPaused ? "block" : "none";
            document.getElementById('pause-btn').innerText = isPaused ? "▶ Resume" : "⏸ Pause";
            if(isPaused) clearInterval(timer); else startTimer();
        }

        function fillSudoku(b) {
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    if(b[r][c] === 0) {
                        let ns = [...Array(10).keys()].slice(1).sort(()=>Math.random()-0.5);
                        for(let n of ns) { if(isValid(b,r,c,n)) { b[r][c]=n; if(fillSudoku(b)) return true; b[r][c]=0; } }
                        return false;
                    }
                }
            } return true;
        }

        function isValid(b,r,c,n) {
            for(let i=0; i<9; i++) {
                let rS = 3 * Math.floor(r/3), cS = 3 * Math.floor(c/3);
                if(b[r][i]===n || b[i][c]===n || b[rS + Math.floor(i/3)][cS + i%3]===n) return false;
            } return true;
        }

        function render(p) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            p.forEach((row, r) => {
                row.forEach((val, c) => {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    if (r === 2 || r === 5) div.classList.add('row-thick-border');
                    const input = document.createElement('input');
                    input.type = "text"; input.maxLength = 1;
                    input.id = `cell-${r}-${c}`;
                    if(val !== 0) { input.value = val; input.disabled = true; div.classList.add('fixed'); }
                    else { input.oninput = (e) => { if(!/[1-9]/.test(e.target.value)) e.target.value = ''; playEffect('type'); handleTyping(e, r, c); }; }
                    div.appendChild(input); grid.appendChild(div);
                });
            });
        }

        function handleTyping(e, r, c, isAction = false) {
            if(!isAction) { history.push({r, c, val: e.target.getAttribute('old') || ''}); redoStack = []; moves++; }
            document.getElementById('move-count').innerText = moves;
            const val = e.target.value;
            if(currentDiff === 'easy' && val !== "") e.target.className = (val == sol[r][c]) ? "user-correct" : "user-wrong";
            else e.target.className = "";
            e.target.setAttribute('old', val);
            checkWin();
        }

        function giveHint() {
            if(hints <= 0) return;
            let empty = Array.from(document.querySelectorAll('input:not(:disabled)')).filter(i => i.value == "");
            if(empty.length) {
                let target = empty[Math.floor(Math.random()*empty.length)];
                let parts = target.id.split('-');
                let r = parseInt(parts[1]), c = parseInt(parts[2]);
                target.value = sol[r][c];
                target.className = "hint-filled";
                hints--; moves++;
                document.getElementById('h-count').innerText = hints;
                document.getElementById('move-count').innerText = moves;
                checkWin();
            }
        }

        function revealAnswer() {
            if(!sol.length) return;
            clearInterval(timer);
            document.querySelectorAll('input:not(:disabled)').forEach(input => {
                let p = input.id.split('-');
                input.value = sol[parseInt(p[1])][parseInt(p[2])];
                input.style.color = "#e74c3c";
                input.disabled = true;
            });
            alert("Game Over! Answer Revealed.");
        }

        function undo() {
            if(!history.length) return;
            const last = history.pop(); const input = document.getElementById(`cell-${last.r}-${last.c}`);
            redoStack.push({r: last.r, c: last.c, val: input.value});
            input.value = last.val; moves++; handleTyping({target: input}, last.r, last.c, true);
        }

        function redo() {
            if(!redoStack.length) return;
            const next = redoStack.pop(); const input = document.getElementById(`cell-${next.r}-${next.c}`);
            history.push({r: next.r, c: next.c, val: input.value});
            input.value = next.val; moves++; handleTyping({target: input}, next.r, next.c, true);
        }

        function startTimer() {
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60).toString().padStart(2,'0'), s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer-display').innerText = `⏱ ${m}:${s}`;
            }, 1000);
        }

        function checkWin() {
            let inputs = Array.from(document.querySelectorAll('input:not(:disabled)'));
            if(inputs.length && inputs.every(i => {
                let p = i.id.split('-');
                return i.value != "" && parseInt(i.value) === sol[parseInt(p[1])][parseInt(p[2])];
            })) { 
                clearInterval(timer); 
                playEffect('win');
                let comment = (seconds <= normalSecs[currentDiff]) ? "SHABASH! You are a GENIUS! 🧠" : "WELL DONE! You solved it! ✨";
                alert(comment + "\nTime: " + document.getElementById('timer-display').innerText); 
            }
        }

        updateTargetInfo();
        render(Array.from({length:9},()=>Array(9).fill(0)));
    </script>
</body>
</html>
